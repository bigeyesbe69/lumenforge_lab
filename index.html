<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="LumenForgeLab — Coming Soon" />
  <title>LumenForgeLab — Coming Soon</title>
  <style>
    :root{
      --bg:#050608;
      --text:#efe6c9;
      --muted:#b8ae92;
      --gold:#d8b46a;
      --line:rgba(216,180,106,.18);
      --glow:0 0 32px rgba(216,180,106,.18),0 0 80px rgba(216,180,106,.08);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      min-height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    body{
      min-height:100vh;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 38%, rgba(216,180,106,.12), transparent 28%),
        radial-gradient(circle at 20% 20%, rgba(100,130,255,.07), transparent 30%),
        radial-gradient(circle at 80% 80%, rgba(0,190,255,.04), transparent 24%),
        linear-gradient(180deg, #090b0f 0%, #050608 55%, #030406 100%);
    }
    body::before, body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
    }
    body::before{
      background:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size:64px 64px;
      mask-image:radial-gradient(circle at center, black 38%, transparent 82%);
      opacity:.24;
    }
    body::after{
      background:radial-gradient(circle at center, transparent 45%, rgba(0,0,0,.55) 100%);
    }
    .stage{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:4vw;
      position:relative;
      isolation:isolate;
    }
    .orb{
      position:absolute;
      width:min(80vw, 800px);
      aspect-ratio:1;
      border-radius:50%;
      border:1px solid var(--line);
      box-shadow:inset 0 0 40px rgba(216,180,106,.04), 0 0 80px rgba(216,180,106,.06);
      animation:pulse 7s ease-in-out infinite;
    }
    .orb::before, .orb::after{
      content:"";
      position:absolute;
      inset:8%;
      border-radius:50%;
      border:1px solid rgba(216,180,106,.08);
    }
    .orb::after{
      inset:18%;
      border-color:rgba(216,180,106,.06);
    }
    .panel{
      width:min(100%, 1200px);
      display:grid;
      gap:1.5rem;
      justify-items:center;
      position:relative;
      z-index:2;
      text-align:center;
    }
    .logo-wrap{
      width:min(92vw, 1100px);
      position:relative;
      animation:float 6s ease-in-out infinite;
      filter:drop-shadow(0 0 22px rgba(216,180,106,.12));
    }
    .logo-wrap::before{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width:72%;
      height:72%;
      transform:translate(-50%, -50%);
      background:radial-gradient(circle, rgba(216,180,106,.22), rgba(216,180,106,.03) 40%, transparent 70%);
      filter:blur(24px);
      z-index:-1;
      animation:halo 5.5s ease-in-out infinite;
    }
    .logo{
      width:100%;
      height:auto;
      display:block;
      border-radius:28px;
      box-shadow:var(--glow);
    }
    .coming-soon{
      letter-spacing:.5em;
      text-transform:uppercase;
      font-size:clamp(.85rem, .7rem + .6vw, 1.15rem);
      color:var(--text);
      text-shadow:0 0 12px rgba(216,180,106,.18);
      padding-left:.5em;
    }
    .tagline{
      max-width:42rem;
      color:var(--muted);
      font-size:clamp(.95rem, .85rem + .45vw, 1.15rem);
      line-height:1.7;
    }
    .corner{
      position:fixed;
      right:24px;
      bottom:24px;
      width:18px;
      aspect-ratio:1;
      background:linear-gradient(135deg, rgba(255,255,255,.95), rgba(216,180,106,.7));
      transform:rotate(45deg);
      box-shadow:0 0 20px rgba(255,255,255,.25);
      opacity:.8;
      animation:blink 3.8s ease-in-out infinite;
    }
    @keyframes float{
      0%,100%{transform:translateY(0) scale(1)}
      50%{transform:translateY(-8px) scale(1.008)}
    }
    @keyframes halo{
      0%,100%{opacity:.55;transform:translate(-50%, -50%) scale(.98)}
      50%{opacity:.95;transform:translate(-50%, -50%) scale(1.04)}
    }
    @keyframes pulse{
      0%,100%{transform:scale(.98);opacity:.6}
      50%{transform:scale(1.02);opacity:.95}
    }
    @keyframes blink{
      0%,100%{opacity:.35}
      50%{opacity:1}
    }
    @media (max-width:640px){
      .logo-wrap{width:min(100vw, 820px)}
      .coming-soon{letter-spacing:.34em}
      .tagline{padding-inline:.75rem}
    }
    @media (prefers-reduced-motion: reduce){
      *,*::before,*::after{animation:none !important;transition:none !important}
    }
  </style>
</head>
